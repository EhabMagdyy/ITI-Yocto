# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-weather"
BBFILE_PATTERN_meta-weather = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-weather = "6"

LAYERDEPENDS_meta-weather = "core"
LAYERSERIES_COMPAT_meta-weather = "scarthgap"

# Add the application to the image
IMAGE_INSTALL:append = " sayhi"
